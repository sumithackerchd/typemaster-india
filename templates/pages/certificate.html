{% extends "layouts/base.html" %}

{% block title %}Certificate{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/certificate.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&display=swap" rel="stylesheet">

<div class="certificate-page">

{% set cert_user = current_user %}
{% include "pages/_certificate_card.html" %}

<div class="certificate-actions">
    <a href="{{ url_for('result.download_certificate', result_id=result.id) }}" class="btn btn-success btn-lg"><i class="fa-solid fa-file-pdf me-2"></i>Download PDF</a>
    <button onclick="window.print()" class="btn btn-primary btn-lg"><i class="fa-solid fa-print me-2"></i>Print</button>
    <a href="{{ url_for('dashboard.dashboard_page') }}" class="btn btn-dark btn-lg">Dashboard</a>
</div>

<div class="certificate-hidden">
    <span>{{ certificate_id }}</span>
    <span>{{ current_user.full_name }}</span>
</div>

</div>

{% endblock %}
