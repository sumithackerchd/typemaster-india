{% extends "layouts/base.html" %}

{% block title %}Typing Test{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/typing.css') }}">

<div class="typing-wrapper" id="typingWrapper">

    <div class="typing-top">

        <div class="logo-title">
            <h2 id="typingTitle">English Typing Test</h2>
        </div>

        <div class="d-flex gap-2 align-items-center">
            <button id="restartBtn" class="mode" type="button">↺ Restart</button>
            <div class="timer-card">⏱️ <span id="timer">60</span>s</div>
        </div>

    </div>

    <div class="toolbar">

        <button class="mode language-btn active" type="button" data-lang="english">English</button>
        <button class="mode language-btn" type="button" data-lang="hindi">Hindi Mangal</button>

        <span class="toolbar-divider"></span>

        <button class="mode difficulty-btn active" type="button" data-level="easy">Easy</button>
        <button class="mode difficulty-btn" type="button" data-level="medium">Medium</button>
        <button class="mode difficulty-btn" type="button" data-level="hard">Hard</button>

        <span class="toolbar-divider"></span>

        <button class="mode timer-btn active" type="button" data-seconds="60" id="timer60">60s</button>
        <button class="mode timer-btn" type="button" data-seconds="120" id="timer120">120s</button>
        <button class="mode timer-btn" type="button" data-seconds="300" id="timer300">300s</button>

    </div>

    <div class="typing-card">

        <div class="typing-viewport" id="typingViewport">
            <div id="paragraph"></div>
        </div>

        <input type="text" id="typingInput" autocomplete="off"
               autocorrect="off" autocapitalize="off" spellcheck="false">

    </div>

    <div class="stats stats-six">

        <div class="box">
            <h5>Net WPM</h5>
            <h2 id="netWpm">0</h2>
        </div>

        <div class="box">
            <h5>Gross WPM</h5>
            <h2 id="grossWpm">0</h2>
        </div>

        <div class="box">
            <h5>CPM</h5>
            <h2 id="cpm">0</h2>
        </div>

        <div class="box">
            <h5>Accuracy</h5>
            <h2 id="accuracy">100%</h2>
        </div>

        <div class="box">
            <h5>Errors</h5>
            <h2 id="errors">0</h2>
        </div>

        <div class="box">
            <h5>Live WPM</h5>
            <h2 id="liveWpm">0</h2>
        </div>

    </div>

</div>

<script>
    window.TYPING_CONFIG = {
        defaultLanguage: "english",
        redirectUrl: "{{ url_for('result.result_page') }}",
        saveResultUrl: "{{ url_for('result.save_result') }}",
        languages: {
            english: {
                languageKey: "english",
                dataUrl: "{{ url_for('static', filename='data/paragraphs.json') }}",
                saveLanguage: "English",
                title: "English Typing Test",
                paragraphClass: ""
            },
            hindi: {
                languageKey: "hindi",
                dataUrl: "{{ url_for('static', filename='data/hindi_mangal.json') }}",
                saveLanguage: "Hindi",
                title: "Hindi Mangal Typing Test",
                paragraphClass: "hindi-paragraph"
            }
        }
    };
</script>
<script src="{{ url_for('static', filename='js/engine.js') }}"></script>

{% endblock %}
